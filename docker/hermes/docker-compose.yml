# Containerized Hermes Agent, run in parallel with the OpenClaw gateway.
# Bring up:  ./materialize-hermes-secrets.sh && docker compose up -d
# CLI:       docker compose exec hermes hermes
# Logs:      docker compose logs -f hermes
services:
  hermes:
    build: .
    image: hermes:local
    container_name: hermes
    restart: unless-stopped

    # State only (sessions/skills/memory). Hermes is stateful — this volume is the
    # point of the deployment. Secrets are NEVER written here.
    volumes:
      - hermes-data:/data

    # Secrets reach Hermes ONLY as process env, from the host-resolved tmpfs file.
    env_file:
      - ${HERMES_SECRETS_ENV:-/run/user/1000/hermes-secrets/hermes.env}

    environment:
      HERMES_HOME: /data
      HERMES_IGNORE_USER_CONFIG: "1"
      # Redirect the XDG state dir (gateway locks etc.) onto the writable /data
      # volume — the image rootfs is read-only, so ~/.local/state can't be written.
      XDG_STATE_HOME: /data/state
      # Non-secret behaviour settings (kept out of the secret env-file on purpose).
      # Default to Owl Alpha (free, agentic, 1M+ ctx, tool use) on OpenRouter.
      # `hermes model` is interactive-only, so we pin the default via env across all
      # code paths: HERMES_INFERENCE_* (oneshot/-z + inference), HERMES_MODEL (cron),
      # HERMES_TUI_PROVIDER (chat). Verified end-to-end with `hermes -z`.
      HERMES_INFERENCE_PROVIDER: ${HERMES_INFERENCE_PROVIDER:-openrouter}
      HERMES_INFERENCE_MODEL: ${HERMES_INFERENCE_MODEL:-openrouter/owl-alpha}
      HERMES_MODEL: ${HERMES_MODEL:-openrouter/owl-alpha}
      HERMES_TUI_PROVIDER: ${HERMES_TUI_PROVIDER:-openrouter}
      # Messaging gateway allowlists (non-secret user-id CSVs). The bot TOKENS go in
      # hermes.env.tpl (1Password), NOT here. Without an allowlist all users are
      # denied. See "Messaging gateway" in docs/hermes-agent.md.
      TELEGRAM_ALLOWED_USERS: "5089072082"
      # SLACK_ALLOWED_USERS: "U0123456789"
      # DISCORD_ALLOWED_USERS: "123456789012345678"

    # No inbound ports — the gateway is outbound-polling.

    # Fine-grained control of the self-improving agent:
    read_only: true                 # immutable rootfs; only /data + tmpfs are writable
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    pids_limit: 512
    mem_limit: 4g
    tmpfs:
      - /tmp
      - /home/hermes/.cache         # uv/python/playwright scratch under XDG_CACHE_HOME
    # If a skill needs more writable paths, relax read_only or add a named tmpfs —
    # do NOT mount host paths or the OpenClaw workspace in here.

volumes:
  hermes-data:
