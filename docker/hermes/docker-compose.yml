# Containerized Hermes Agent, run in parallel with the OpenClaw gateway.
# Bring up:  ./materialize-hermes-secrets.sh && docker compose up -d
# CLI:       docker compose exec hermes hermes
# Logs:      docker compose logs -f hermes
# Remote desktop gateway (opt-in): docker compose --profile dashboard up -d

# Shared hardening + mounts for every Hermes container (the cage).
x-hermes-common: &hermes-common
  image: hermes:local
  restart: unless-stopped
  # State only (sessions/skills/memory). Secrets are NEVER written here.
  volumes:
    - hermes-data:/data
  # Secrets reach Hermes ONLY as process env, from the host-resolved tmpfs file.
  env_file:
    - ${HERMES_SECRETS_ENV:-/run/user/1000/hermes-secrets/hermes.env}
  read_only: true                 # immutable rootfs; only /data + tmpfs are writable
  cap_drop: [ALL]
  security_opt:
    - no-new-privileges:true
  pids_limit: 512
  mem_limit: 4g
  tmpfs:
    - /tmp
    - /home/hermes/.cache         # uv/python scratch under XDG_CACHE_HOME
    - /home/hermes/.config        # writable config dir for in-container `op` (rootfs is ro)

# Shared non-secret behaviour env. Secrets stay in the env-file, not here.
x-hermes-env: &hermes-env
  HERMES_HOME: /data
  # Redirect the XDG state dir (gateway locks etc.) onto the writable /data volume —
  # the rootfs is read-only, so ~/.local/state can't be written.
  XDG_STATE_HOME: /data/state
  # Full autonomy INSIDE the sandbox (read globally incl. the gateway agent, see
  # tools/approval.py). Safe because the container is the cage. See docs "Autonomy".
  HERMES_YOLO_MODE: "1"
  HERMES_ACCEPT_HOOKS: "1"
  # `:online` enables OpenRouter server-side web search (Exa: search + page read) for
  # the interactive/gateway model — searches only when needed (~$0.005/search), no
  # extra keys. Cron stays on plain owl-alpha (no search cost on automated turns).
  HERMES_INFERENCE_PROVIDER: ${HERMES_INFERENCE_PROVIDER:-openrouter}
  HERMES_INFERENCE_MODEL: ${HERMES_INFERENCE_MODEL:-openrouter/owl-alpha:online}
  HERMES_MODEL: ${HERMES_MODEL:-openrouter/owl-alpha}
  HERMES_TUI_PROVIDER: ${HERMES_TUI_PROVIDER:-openrouter}

services:
  # Messaging gateway (Telegram). Outbound-polling, so no inbound ports.
  hermes:
    <<: *hermes-common
    build: .
    container_name: hermes
    environment:
      <<: *hermes-env
      # Messaging allowlist (non-secret user-id CSV); bot TOKENS live in 1Password.
      TELEGRAM_ALLOWED_USERS: "5089072082"
    # CMD from the image: hermes gateway run

  # Remote gateway for the Hermes Desktop app (opt-in: `--profile dashboard`).
  # Serves the dashboard/web_server the desktop attaches to over the network. Binds
  # 0.0.0.0 inside the container (required for Docker port publish) → the dashboard
  # FORCES an auth provider. Published to host loopback only; expose to the laptop
  # via `tailscale serve` (TLS, tailnet-only) — never a public bind. Shares /data.
  hermes-dashboard:
    <<: *hermes-common
    container_name: hermes-dashboard
    profiles: ["dashboard"]
    environment:
      <<: *hermes-env
    command: ["hermes", "dashboard", "--host", "0.0.0.0", "--port", "9119", "--no-open", "--skip-build"]
    ports:
      - "127.0.0.1:9119:9119"

volumes:
  hermes-data:
